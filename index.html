<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AspireFyX</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0e0c;
      --paper: #f5f2ec;
      --accent: #c8a96e;
      --muted: #7a7570;
      --rule: #d8d3ca;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --mono: 'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--serif);
      font-size: 18px;
      line-height: 1.6;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    body.loaded { opacity: 1; }

    /* LOADING */
    #loader {
      position: fixed; inset: 0;
      background: var(--paper);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      transition: opacity 0.5s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .loader-text {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.5rem 4rem;
      z-index: 100;
      background: rgba(245,242,236,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--rule);
    }
    .nav-logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .nav-tagline {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .nav-cta a {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
      transition: color 0.2s;
    }
    .nav-cta a:hover { color: var(--accent); }

    /* SECTIONS */
    section { padding: 6rem 4rem; }
    .container { max-width: 1100px; margin: 0 auto; }

    /* HERO */
    #hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding-top: 8rem;
      border-bottom: 1px solid var(--rule);
    }
    .hero-inner { max-width: 1100px; margin: 0 auto; width: 100%; }
    .eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
    }
    .hero-headline {
      font-size: clamp(3rem, 6vw, 5.5rem);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }
    .hero-italic {
      font-style: italic;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 2rem;
    }
    .hero-body {
      max-width: 600px;
      font-size: 1rem;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.8;
      margin-bottom: 3rem;
    }
    .btn-group { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
    .btn-primary {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      padding: 1rem 2rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--accent); }
    .btn-secondary {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover { color: var(--accent); border-color: var(--accent); }
    .assessment-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 1.5rem;
    }

    /* WHO WE SERVE */
    #wws { border-bottom: 1px solid var(--rule); }
    .section-header { margin-bottom: 4rem; }
    .section-title {
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .section-sub {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* PROFILES */
    .profiles-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 3rem; }
    .profile-card {
      background: var(--ink);
      color: var(--paper);
      padding: 3rem 2.5rem;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    .profile-card:hover { transform: translateY(-4px); }
    .profile-tag {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }
    .profile-headline {
      font-size: 1.6rem;
      font-weight: 300;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }
    .profile-lead {
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.8;
      color: rgba(245,242,236,0.6);
      margin-bottom: 2rem;
    }
    .risk-box {
      border-top: 1px solid rgba(245,242,236,0.2);
      padding-top: 1.5rem;
      margin-top: auto;
    }
    .risk-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .risk-quote {
      font-style: italic;
      font-size: 0.95rem;
      color: rgba(245,242,236,0.75);
      line-height: 1.5;
    }

    /* BOOK */
    #book { border-bottom: 1px solid var(--rule); background: var(--ink); color: var(--paper); }
    #book .eyebrow { color: var(--accent); }
    #book .section-title { color: var(--paper); }
    .book-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: center; }
    .book-subline {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.8;
      color: rgba(245,242,236,0.6);
      margin-bottom: 2.5rem;
    }
    .book-points { list-style: none; margin-bottom: 3rem; }
    .book-points li {
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(245,242,236,0.7);
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(245,242,236,0.1);
      display: flex; align-items: center; gap: 1rem;
    }
    .book-points li::before { content: '—'; color: var(--accent); flex-shrink: 0; }
    .book-visual {
      display: flex; align-items: center; justify-content: center;
      height: 350px;
      border: 1px solid rgba(245,242,236,0.1);
      position: relative;
    }
    .book-visual-inner {
      text-align: center;
    }
    .book-visual-num {
      font-size: 8rem;
      font-weight: 300;
      color: rgba(200, 169, 110, 0.15);
      line-height: 1;
      font-style: italic;
    }
    .book-visual-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,242,236,0.3);
      margin-top: -1rem;
    }

    /* ABOUT */
    #about { border-bottom: 1px solid var(--rule); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; }
    .founder-name {
      font-size: 2rem;
      font-weight: 300;
      margin-bottom: 0.25rem;
    }
    .founder-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
    }
    .founder-bio {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.9;
      color: var(--muted);
    }
    .philosophy-heading {
      font-size: 1.5rem;
      font-weight: 300;
      font-style: italic;
      margin-bottom: 1rem;
      color: var(--muted);
    }
    .philosophy-text {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.9;
      color: var(--muted);
    }

    /* FOOTER */
    footer {
      padding: 3rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--rule);
    }
    .footer-tagline {
      font-style: italic;
      font-size: 1rem;
      color: var(--muted);
    }
    .footer-meta {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-align: right;
    }
    .footer-meta a { color: var(--muted); text-decoration: none; }
    .footer-meta a:hover { color: var(--accent); }

    /* ERROR */
    #error-msg {
      display: none;
      padding: 2rem;
      background: #fff0f0;
      color: #c00;
      font-family: var(--mono);
      font-size: 13px;
      margin: 2rem;
      border: 1px solid #fcc;
    }

    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; }
      .nav-tagline { display: none; }
      section { padding: 4rem 1.5rem; }
      .profiles-grid { grid-template-columns: 1fr; }
      .book-grid, .about-grid { grid-template-columns: 1fr; gap: 3rem; }
      .book-visual { display: none; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
      .footer-meta { text-align: center; }
    }
  </style>
</head>
<body>

<div id="loader"><span class="loader-text">Loading content…</span></div>
<div id="error-msg"></div>

<nav>
  <div class="nav-logo" id="nav-name">AspireFyX</div>
  <div class="nav-tagline" id="nav-tagline"></div>
  <div class="nav-cta"><a href="#book" id="nav-cta">Book a Session</a></div>
</nav>

<section id="hero">
  <div class="hero-inner">
    <div class="eyebrow" id="hero-eyebrow"></div>
    <h1 class="hero-headline" id="hero-headline"></h1>
    <p class="hero-italic" id="hero-italic"></p>
    <p class="hero-body" id="hero-body"></p>
    <div class="btn-group">
      <a href="#book" class="btn-primary" id="hero-cta-primary"></a>
      <a href="#wws" class="btn-secondary" id="hero-cta-secondary"></a>
    </div>
    <p class="assessment-tag" id="assessment-tag"></p>
  </div>
</section>

<section id="wws">
  <div class="container">
    <div class="section-header">
      <div class="eyebrow">Who We Serve</div>
      <h2 class="section-title" id="wws-heading"></h2>
      <p class="section-sub" id="wws-subheading"></p>
    </div>
    <div class="profiles-grid" id="profiles-grid"></div>
  </div>
</section>

<section id="book">
  <div class="container">
    <div class="book-grid">
      <div>
        <div class="eyebrow" id="book-eyebrow"></div>
        <h2 class="section-title" id="book-headline"></h2>
        <p class="book-subline" id="book-subline"></p>
        <ul class="book-points" id="book-points"></ul>
        <a href="#" class="btn-primary" id="book-cta" style="display:inline-block;">Book Now →</a>
      </div>
      <div class="book-visual">
        <div class="book-visual-inner">
          <div class="book-visual-num">45'</div>
          <div class="book-visual-label">Discovery Session</div>
        </div>
      </div>
    </div>
  </div>
</section>

<section id="about">
  <div class="container">
    <div class="eyebrow">The Firm</div>
    <div class="about-grid">
      <div>
        <h2 class="section-title" id="about-headline"></h2>
        <p class="founder-name" id="founder-name"></p>
        <p class="founder-title" id="founder-title"></p>
        <p class="founder-bio" id="founder-bio"></p>
      </div>
      <div>
        <p class="philosophy-heading" id="philosophy-heading"></p>
        <p class="philosophy-text" id="philosophy-text"></p>
        <p style="margin-top:2rem; font-family:var(--mono); font-size:11px; color:var(--muted);" id="founding-text"></p>
      </div>
    </div>
  </div>
</section>

<footer>
  <p class="footer-tagline" id="footer-tagline"></p>
  <div class="footer-meta">
    <span id="footer-location"></span><br>
    <a href="#" id="footer-email"></a>
  </div>
</footer>

<script>
  async function loadContent() {
    try {
      const res = await fetch('/content/data.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();

      // Site
      document.title = d.site?.name || 'AspireFyX';
      document.getElementById('nav-name').textContent = d.site?.name || '';
      document.getElementById('nav-tagline').textContent = d.site?.tagline || '';

      // Hero
      document.getElementById('hero-eyebrow').textContent = d.home?.hero_eyebrow || '';
      document.getElementById('hero-headline').textContent = d.home?.hero_headline || '';
      document.getElementById('hero-italic').textContent = d.home?.hero_italic || '';
      document.getElementById('hero-body').textContent = d.home?.hero_body || '';
      document.getElementById('hero-cta-primary').textContent = d.home?.hero_cta_primary || '';
      document.getElementById('hero-cta-secondary').textContent = d.home?.hero_cta_secondary || '';
      document.getElementById('assessment-tag').textContent = d.home?.assessment_tagline || '';

      // WWS
      document.getElementById('wws-heading').textContent = d.home?.wws_heading || '';
      document.getElementById('wws-subheading').textContent = d.home?.wws_subheading || '';

      // Profiles
      const profiles = ['pathfinders', 'professionals', 'builders'];
      const grid = document.getElementById('profiles-grid');
      profiles.forEach(key => {
        const p = d[key];
        if (!p) return;
        grid.innerHTML += `
          <div class="profile-card">
            <div class="profile-tag">${p.tag || ''}</div>
            <h3 class="profile-headline">${p.hero_headline || ''}</h3>
            <p class="profile-lead">${p.hero_lead || ''}</p>
            <div class="risk-box">
              <div class="risk-label">${p.risk_label || ''}</div>
              <p class="risk-quote">${p.risk_quote || ''}</p>
            </div>
          </div>`;
      });

      // Book
      document.getElementById('book-eyebrow').textContent = d.book?.eyebrow || '';
      document.getElementById('book-headline').textContent = d.book?.headline || '';
      document.getElementById('book-subline').textContent = d.book?.subline || '';
      const pts = document.getElementById('book-points');
      ['point1','point2','point3'].forEach(k => {
        if (d.book?.[k]) pts.innerHTML += `<li>${d.book[k]}</li>`;
      });
      const bookCta = document.getElementById('book-cta');
      bookCta.textContent = 'Book a Discovery Session →';
      bookCta.href = d.site?.booking_url || '#';

      // About
      document.getElementById('about-headline').textContent = d.about?.headline || '';
      document.getElementById('founder-name').textContent = d.about?.founder_name || '';
      document.getElementById('founder-title').textContent = d.about?.founder_title || '';
      document.getElementById('founder-bio').textContent = d.about?.founder_bio || '';
      document.getElementById('philosophy-heading').textContent = d.about?.philosophy_heading || '';
      document.getElementById('philosophy-text').textContent = d.about?.philosophy_text || '';
      document.getElementById('founding-text').textContent = d.about?.founding_text || '';

      // Footer
      document.getElementById('footer-tagline').textContent = d.footer?.tagline || '';
      document.getElementById('footer-location').textContent = d.footer?.location || '';
      const email = d.footer?.email || d.site?.email || '';
      const emailEl = document.getElementById('footer-email');
      emailEl.textContent = email;
      emailEl.href = `mailto:${email}`;

    } catch (err) {
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'block';
      errEl.textContent = `⚠ Could not load content/data.json — ${err.message}. Make sure this file is served from the same domain.`;
    } finally {
      document.getElementById('loader').classList.add('hidden');
      document.body.classList.add('loaded');
    }
  }

  loadContent();
</script>
</body>
</html>
